<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A flower that blooms with your hands, and carries a message">
    <title>Flower Bloom — For You</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%9C%BF%3C/text%3E%3C/svg%3E">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Webcam feed -->
        <video id="webcam" autoplay playsinline></video>
        <!-- Canvas overlay for rendering flower + hand skeleton -->
        <canvas id="canvas"></canvas>
        <!-- Subtle vignette -->
        <div class="vignette"></div>
 
        <!-- Loading screen -->
        <div class="loading-overlay" id="loading">
            <div class="loading-flower"></div>
            <div class="loading-text" id="loadingText">Initializing Hand Tracking</div>
            <div class="loading-subtext" id="loadingSubtext">Please allow camera access</div>
        </div>
 
        <!-- Shown only if the camera cannot be accessed -->
        <div class="camera-error hidden" id="cameraError">
            <div class="camera-error-icon">✿</div>
            <div class="camera-error-title">Camera access needed</div>
            <div class="camera-error-text">
                This little flower needs your camera to bloom. Please allow camera
                access in your browser and refresh the page.
            </div>
        </div>
 
        <!-- Instructions -->
        <div class="instructions" id="instructions">
            <span>Left hand pinch</span> controls Bloom &nbsp;·&nbsp;
            <span>Right hand pinch</span> controls Growth &nbsp;·&nbsp;
            <span>Sway hands</span> to create wind
        </div>
 
        <!-- Soft larger photo reveal, fades in behind the message card on full bloom -->
        <div class="photo-reveal hidden" id="photoReveal">
            <img id="photoRevealImg" alt="" />
        </div>
 
        <!-- Message that reveals itself once the flower fully blooms -->
        <div class="message-card hidden" id="messageCard">
            <div class="photo-frame" id="photoFrame">
                <img id="photoFrameImg" alt="" />
            </div>
            <div class="message-text">
                <div class="message-heading" id="messageHeading">To You</div>
                <div class="message-body" id="messageBody"></div>
                <div class="message-signature" id="messageSignature"></div>
            </div>
        </div>
 
        <!-- Lets her bring the message back after it fades, without re-blooming -->
        <button class="replay-btn hidden" id="replayBtn" aria-label="Show the message again">
            ✿ &nbsp;See the message again
        </button>
    </div>
 
    <!-- MediaPipe Hands -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3/camera_utils.js" crossorigin="anonymous"></script>
    <!-- Personal message config -->
    <script src="message.js"></script>
    <!-- Application -->
    <script src="app.js"></script>
</body>
</html>
